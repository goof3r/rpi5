<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TSK · Quake Live Servers</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <h1>TSK <span class="muted">·</span> Quake Live Servers</h1>
  <p class="updated">Aktualizacja: <span id="updated">—</span> <span class="muted">· auto-odświeżanie 10 s</span></p>
</header>
<main id="grid" class="grid"></main>
<footer><span class="muted">qlstatus · Steam A2S query</span></footer>
<script>
const pad = n => String(n).padStart(2, '0');
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDur = s => {
  if (!s) return '0:00';
  const m = Math.floor(s/60), r = s%60;
  return `${m}:${pad(r)}`;
};
const cardHtml = s => `
<a class="card ${s.online ? 'online' : 'offline'}" data-id="${esc(s.id)}" href="${esc(s.connect)}" title="Kliknij, aby dołączyć przez Steam: ${esc(s.host)}:${s.port}">
  <span class="join-badge">▶ JOIN</span>
  <div class="shot" style="background-image:url('${s.map ? `/levelshot/${encodeURIComponent(s.map)}.jpg` : '/static/placeholder.svg'}')"></div>
  <div class="body">
    <h2>${esc(s.name)}</h2>
    <div class="meta">
      <span class="dot"></span><span class="state">${s.online ? 'ONLINE' : 'OFFLINE'}</span>
      <span class="addr">${esc(s.host)}:${s.port}</span>
    </div>
    <div class="meta">
      <span>Mapa: <b>${esc(s.map) || '—'}</b></span>
      <span>Tryb: <b>${esc(s.gametype) || '—'}</b></span>
      <span>Gracze: <b>${s.humans}/${s.maxPlayers || '?'}${s.bots ? ` <small>(+${s.bots} bot${s.bots>1?'y':''})</small>`:''}</b></span>
    </div>
    <ul class="players">
      ${s.players.length
        ? s.players.map(p => `<li><span class="frags">${p.frags}</span><span class="name">${esc(p.name)}</span><span class="ping">${fmtDur(p.duration)}</span></li>`).join('')
        : '<li class="empty">Brak graczy</li>'}
    </ul>
    <div class="manual" title="Kliknij, aby skopiować — wklej w konsoli QL (~)" data-copy="/connect ${esc(s.host)}:${s.port}">/connect ${esc(s.host)}:${s.port} <span class="copy-hint">📋</span></div>
  </div>
</a>`;
async function tick() {
  let data;
  try {
    const r = await fetch('/api/status', {cache: 'no-store'});
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
  } catch (e) { return; }
  document.getElementById('grid').innerHTML = data.map(cardHtml).join('');
  const d = new Date();
  document.getElementById('updated').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
tick();
setInterval(tick, 10000);

document.addEventListener('click', e => {
  const m = e.target.closest('.manual');
  if (!m) return;
  e.preventDefault();
  e.stopPropagation();
  const text = m.dataset.copy || m.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    m.classList.add('copied');
    setTimeout(() => m.classList.remove('copied'), 1200);
  }).catch(() => {});
});
</script>
</body>
</html>
