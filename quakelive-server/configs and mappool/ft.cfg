// ===========================================================================
//  ft.cfg — serwer trybu FT (minqlx). Wygenerowane przez instalator.
//  Lista pluginów oczyszczona: bez irc / patch / specvote.
//  UWAGA: kluczowe cvary (broń, vote, mappool, delay) są w FACTORY
//  (scripts/gametypes.factories -> mg_ft_fullclassic), bo factory
//  nadpisuje server.cfg. Te tutaj to wartości startowe / dla pewności.
// ===========================================================================
set sv_hostname            "[TSK] THE SHADOWS KILLERS #FT"
set sv_tags                "FT, FREEZE TAG, minqlx, qlstats.net, ELO, tsk, [TSK],"
set g_accessFile           "access.txt"
set sv_maxClients          "22"
set com_hunkMegs           "90"
set sv_floodprotect        "10"
set g_floodprot_maxcount   "10"
set g_floodprot_decay      "1000"

// --- Głosowania ---
// 15464 = blokada: gametype(8) + timelimit(32) + fraglimit(64) +
//         loadouts(1024) + END-GAME VOTE(2048) + ammo(4096) + timers(8192)
// Bit 2048 wyłącza UI vote 3 map po meczu (znany bug QLDS pokazujący nie-FT mapy)
set g_voteFlags            "15464"
set g_allowVote            "1"
set g_voteDelay            "5000"
set g_allowVoteMidGame     "0"
set g_allowSpecVote        "0"

set g_inactivity           "120"
set g_alltalk              "0"
set sv_serverType          "2"
set sv_master              "1"
set sv_fps                 "40"
set sv_idleExit            "600"

// --- Czas gry: 10 minut LUB 10 wygranych rund ---
set timelimit              "10"
set roundlimit             "10"
set fraglimit              "0"
set teamsize               "8"

// --- Broń startowa: Gauntlet + MG + SG + PG = 135 ---
// (1=Gauntlet, 2=MG, 4=SG, 128=PG). HMG to bit 4096 — NIE dodajemy.
set g_startingWeapons      "135"

// --- Po meczu: wymuszona rotacja z mappool_ft.txt (bez UI vote) ---
set g_forceNextMap         "1"

// --- Boty ---
set bot_enable             "1"

// minqlx
set qlx_owner              "76561198799965164"
set qlx_plugins            "plugin_manager, essentials, motd, permission, warmup_weapons, maps, mbot, ban, clan, names, silence, log, balance, branding, workshop, weaponspawnfixer, queue, autospec, checkplayers, votestats, ips, aliases, botmanager, onjoin, serverhelp, permoverride, ft_rotate"
set qlx_database           "Redis"
set qlx_redisAddress       "127.0.0.1"
set qlx_redisDatabase      "0"
set qlx_redisUnixSocket    "0"
set qlx_logs               "5"
set qlx_logsSize           "5000000"
set qlx_mbotPerm           "0"

// balance / leaver
set qlx_balanceAuto        "1"
set qlx_balanceUseLocal    "0"
set qlx_balanceMinimumSuggestionDiff "30"
set qlx_leaverBan          "1"
set qlx_leaverBanThreshold "0.75"

// branding
set qlx_motdHeader         "^7==^2 ^1[TSK] ^7==^2 FT ^7==^3 THE SHADOWS KILLERS ^7==^4 GL HF ^7==^2"
set qlx_serverBrandName    "^1[TSK]^7 FREEZE TAG"
set qlx_serverBrandTopField    "^7Running ^2minqlx^7 and ^2qlstats.net^7"
set qlx_serverBrandBottomField "^7Have ^1fun^7, play well, don't ^3whine^7"
set qlx_votepass           "1"

// --- Pula map: TYLKO FT ---
set sv_mapPoolFile         "mappool_ft.txt"
set qlx_enforceMappool     "1"

// Pierwsza mapa + factory
set serverstartup          "map almostlost mg_ft_fullclassic"
