{% extends 'base.html' %}
{% block title %}Utwórz kontener LXC — Proxmox LXC Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('dashboard') }}" class="btn btn-sm btn-outline-secondary me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0"><i class="bi bi-plus-circle me-2 text-primary"></i>Nowy kontener LXC</h4>
        </div>

        <form method="POST" action="{{ url_for('create_lxc') }}" id="createForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Podstawowe parametry -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-info-circle me-2 text-primary"></i>Podstawowe parametry
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">VMID</label>
                            <div class="input-group">
                                <input type="number" name="vmid" id="vmidInput" class="form-control"
                                       placeholder="auto" min="100" max="999999999">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="loadNextVmid()" title="Pobierz następne wolne VMID">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                            <div class="form-text">Zostaw puste dla automatycznego przydziału.</div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Hostname <span class="text-danger">*</span></label>
                            <input type="text" name="hostname" class="form-control"
                                   placeholder="np. webserver-01" required pattern="[a-zA-Z0-9\-]+"
                                   title="Tylko litery, cyfry i myślniki">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Szablon OS <span class="text-danger">*</span></label>
                            <select name="ostemplate" id="templateSelect" class="form-select" required>
                                <option value="">— Ładowanie szablonów... —</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Hasło root <span class="text-danger">*</span></label>
                            <input type="password" name="root_password" class="form-control"
                                   placeholder="Hasło dla kontenera" required minlength="5">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Zasoby -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-cpu me-2 text-primary"></i>Zasoby
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Pamięć RAM (MB) <span class="text-danger">*</span></label>
                            <select name="memory" class="form-select" required>
                                <option value="256">256 MB</option>
                                <option value="512" selected>512 MB</option>
                                <option value="1024">1 GB (1024 MB)</option>
                                <option value="2048">2 GB (2048 MB)</option>
                                <option value="4096">4 GB (4096 MB)</option>
                                <option value="8192">8 GB (8192 MB)</option>
                                <option value="16384">16 GB (16384 MB)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Swap (MB)</label>
                            <select name="swap" class="form-select">
                                <option value="0">Brak</option>
                                <option value="256">256 MB</option>
                                <option value="512" selected>512 MB</option>
                                <option value="1024">1 GB</option>
                                <option value="2048">2 GB</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Rdzenie CPU <span class="text-danger">*</span></label>
                            <select name="cores" class="form-select" required>
                                {% for n in [1,2,4,6,8,12,16] %}
                                <option value="{{ n }}" {% if n == 1 %}selected{% endif %}>{{ n }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dysk -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-hdd me-2 text-primary"></i>Dysk
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Storage <span class="text-danger">*</span></label>
                            <select name="storage" id="storageSelect" class="form-select" required>
                                <option value="">— Ładowanie... —</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Rozmiar dysku (GB) <span class="text-danger">*</span></label>
                            <select name="disk_gb" class="form-select" required>
                                <option value="4">4 GB</option>
                                <option value="8" selected>8 GB</option>
                                <option value="16">16 GB</option>
                                <option value="32">32 GB</option>
                                <option value="50">50 GB</option>
                                <option value="100">100 GB</option>
                                <option value="200">200 GB</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sieć -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-ethernet me-2 text-primary"></i>Sieć
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Karta sieciowa (Bridge) <span class="text-danger">*</span></label>
                            <select name="bridge" id="bridgeSelect" class="form-select" required>
                                <option value="">— Ładowanie... —</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Model karty</label>
                            <select name="nic_model" class="form-select">
                                <option value="virtio" selected>VirtIO (zalecany)</option>
                                <option value="e1000">Intel E1000</option>
                                <option value="rtl8139">Realtek RTL8139</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Konfiguracja IP</label>
                            <select name="ip_type" id="ipTypeSelect" class="form-select"
                                    onchange="toggleStaticIP()">
                                <option value="dhcp" selected>DHCP (automatyczne)</option>
                                <option value="static">Statyczny IP</option>
                            </select>
                        </div>
                        <div id="staticIpFields" class="col-12 d-none">
                            <div class="row g-3">
                                <div class="col-md-5">
                                    <label class="form-label fw-semibold">Adres IP / maska</label>
                                    <input type="text" name="ip_address" class="form-control"
                                           placeholder="np. 192.168.1.100/24">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Brama (Gateway)</label>
                                    <input type="text" name="gateway" class="form-control"
                                           placeholder="np. 192.168.1.1">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label fw-semibold">DNS</label>
                                    <input type="text" name="nameserver" class="form-control"
                                           placeholder="np. 8.8.8.8">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Opcje dodatkowe -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-sliders me-2 text-primary"></i>Opcje dodatkowe
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="start_after"
                                       id="startAfter" checked>
                                <label class="form-check-label fw-semibold" for="startAfter">
                                    Uruchom kontener po utworzeniu
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="unprivileged"
                                       id="unprivileged" checked>
                                <label class="form-check-label fw-semibold" for="unprivileged">
                                    Kontener unprivileged (zalecane)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-x me-1"></i>Anuluj
                </a>
                <button type="submit" class="btn btn-primary px-4" id="submitBtn">
                    <i class="bi bi-plus-circle me-2"></i>Utwórz kontener LXC
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    loadTemplates();
    loadBridges();
    loadStorages();
    loadNextVmid();
});

function toggleStaticIP() {
    const type = document.getElementById('ipTypeSelect').value;
    document.getElementById('staticIpFields').classList.toggle('d-none', type !== 'static');
}

document.getElementById('createForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Tworzenie...';
});
</script>
{% endblock %}
