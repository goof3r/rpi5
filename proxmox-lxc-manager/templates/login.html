{% extends 'base.html' %}
{% block title %}Logowanie — Proxmox LXC Manager{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-server text-primary" style="font-size:3rem"></i>
                    <h4 class="mt-2 fw-bold">Proxmox LXC Manager</h4>
                    <p class="text-muted small">Panel administracyjny</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Login</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="admin" autofocus required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Hasło</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Zaloguj się
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
