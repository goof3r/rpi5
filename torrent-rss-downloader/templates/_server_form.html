<div class="mb-3">
  <label class="form-label">Nazwa <span class="text-danger">*</span></label>
  <input type="text" name="name" class="form-control" placeholder="np. Dom NAS" required />
</div>
<div class="row g-3">
  <div class="col-8">
    <label class="form-label">Host <span class="text-danger">*</span></label>
    <input type="text" name="host" class="form-control" placeholder="192.168.1.100" required />
  </div>
  <div class="col-4">
    <label class="form-label">Port</label>
    <input type="number" name="port" class="form-control" value="9091" min="1" max="65535" />
  </div>
</div>
<div class="row g-3 mt-0">
  <div class="col-6">
    <label class="form-label">Użytkownik</label>
    <input type="text" name="username" class="form-control" autocomplete="off" />
  </div>
  <div class="col-6">
    <label class="form-label">Hasło</label>
    <input type="password" name="password" class="form-control" autocomplete="new-password" />
  </div>
</div>
<div class="mt-3">
  <label class="form-label">Ścieżka RPC</label>
  <input type="text" name="base_path" class="form-control" value="/transmission/rpc" />
</div>
